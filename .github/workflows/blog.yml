name: Build & Push Multi Tier Blog-App


on:

  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      
      - name: Run Linter
        run: |
          cd server && npm install && npx eslint . || true
          cd ../client && npm install && npx eslint . || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER}}
          password: ${{ secrets.DOCKERHUB_TOKEN}}

# Backend Image:

      - name: Build & Push Backend Code
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: | 
            gauravbanga/blog-backend:latest
            gauravbanga/blog-backend:${{ github.sha }}


# Frontend Image:
      - name: Build & Push Frontend Code
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            gauravbanga/blog-frontend:latest
            gauravbanga/blog-frontend:${{ github.sha }}


# CD Step: 
     
      - name: Deploy To Production server
        uses: appleboy/ssh-action@v1.0.0
        with: 
          host: ${{ secrets.PROD_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: | 
            docker pull gauravbanga/blog-backend:latest
            docker pull gauravbanga/blog-frontend:latest

            docker stop blog-backend || true
            docker rm blog-backend || true
            
            docker stop blog-frontend || true
            docker rm blog-frontend || true
            
            docker run -d -p 5000:5000 --name blog-backend gauravbanga/blog-backend:latest
            docker run -d -p 3000:80 --name blog-frontend gauravbanga/blog-frontend:latest



      - name: Debug Structure
        run: ls -R 