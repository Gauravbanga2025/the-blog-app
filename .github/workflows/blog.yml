name: Build & Push Multi Tier Blog-App


on:

  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      
      - name: Run Linter
        run: |
          cd server && npm install && npx eslint . || true
          cd ../client && npm install && npx eslint . || true
      
      - name: Login in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USER}}
          password: ${{ secrets.DOCKERHUB_TOKEN}}

# Backend Image:

      - name: Build & Push Backend Code
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: | 
            gauravbanga/blog-backend:latest
            gauravbanga/blog-backend:${{ github.sha }}


# Frontend Image:
      - name: Build & Push Frontend Code
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            gauravbanga/blog-frontend:latest
            gauravbanga/blog-frontend:${{ github.sha }}



      - name: Debug Structure
        run: ls -R